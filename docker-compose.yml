version: '3'

volumes:
  pg_data:
  static:
  media:

services:
  postgres:
    image: postgres:13
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: ./backend/
    env_file: .env
    volumes:
      - static:/app/collected_static/
      - media:/app/media/
    depends_on:
      - postgres

  frontend:
    build: ./frontend/
    volumes:
      - static:/app/result_build/build/
    depends_on:
      - backend

  gateway:
    build: ./nginx/
    volumes:
      - static:/static/
      - media:/media/
    ports:
      - "9000:80"
    depends_on:
      - backend
      - frontend