name: Main Kittygram workflow

on:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: kittygram_user
          POSTGRES_PASSWORD: kittygram_password
          POSTGRES_DB: kittygram
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U kittygram_user
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            tests/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8==6.0.0 flake8-isort==6.0.0
          pip install -r backend/requirements.txt
          pip install -r tests/requirements.txt

      - name: Test with flake8
        continue-on-error: true
        run: python -m flake8 backend/

      - name: Run Django checks
        env:
          POSTGRES_USER: kittygram_user
          POSTGRES_PASSWORD: kittygram_password
          POSTGRES_DB: kittygram
          DB_NAME: kittygram
          DB_HOST: localhost
          DB_PORT: 5432
          SECRET_KEY: test-secret-key
          DEBUG: False
          ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          cd backend
          python manage.py migrate
          python manage.py test

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend tests
        run: |
          cd frontend
          npm ci
          npm test -- --watchAll=false

  build_and_push_to_docker_hub:
    name: Push Docker images to DockerHub
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push backend to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: ./backend/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push frontend to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push gateway to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: ./nginx/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push_to_docker_hub

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy docker-compose.production.yml via ssh
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.production.yml"
          target: "kittygram"

      - name: Executing remote ssh commands to deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd kittygram
            printf 'POSTGRES_DB=kittygram\nPOSTGRES_USER=kittygram_user\nPOSTGRES_PASSWORD=kittygram_password\nDB_NAME=kittygram\nDB_HOST=postgres\nDB_PORT=5432\nSECRET_KEY=supersecretkey123\nDEBUG=False\nALLOWED_HOSTS=localhost,127.0.0.1,158.160.219.203\n' > .env
            sudo docker compose -f docker-compose.production.yml down -v
            sudo docker compose -f docker-compose.production.yml pull
            sudo docker compose -f docker-compose.production.yml up -d
            until sudo docker compose -f docker-compose.production.yml exec -T postgres pg_isready -U kittygram_user; do
              sleep 5
            done
            sudo docker compose -f docker-compose.production.yml exec -T backend python manage.py migrate

  post_deploy_tests:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Run autotests
        run: pytest tests/

  send_message:
    runs-on: ubuntu-latest
    needs: post_deploy_tests

    steps:
      - name: Send message to Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ Деплой Kittygram успешно завершён!
            Репозиторий: ${{ github.repository }}
            Коммит: https://github.com/${{ github.repository }}/commit/${{ github.sha }}